name: build
on:
  push:
    branches: [main]
    paths: ['src/**', '.github/workflows/build.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble index.html from src parts
        run: cat src/p1_head.html src/p2_body.html src/p3_cards.html src/p4_questions.html src/p5_core.html src/p6_exam_listen.html > index.html
      - name: Commit assembled file
        run: |
          git config user.name "scrumhack-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "build: assemble index.html"
          git push
