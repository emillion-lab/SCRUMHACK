<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C1015">
<title>SCRUMHACK — PSM I Brain Training</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#0C1015; --panel:#141A22; --panel2:#1B232E; --line:#26303D;
  --ink:#E8EDF2; --dim:#8A97A6; --faint:#5A6675;
  --amber:#FFC53D; --amber-deep:#E8A400; --teal:#2DD4BF; --coral:#FF6B6B; --violet:#A78BFA; --blue:#5CA8FF;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  font-size:16px; line-height:1.5;
  min-height:100dvh; padding-bottom:calc(76px + env(safe-area-inset-bottom));
}
h1,h2,h3{line-height:1.15}
.wrap{max-width:640px;margin:0 auto;padding:16px}
header.top{display:flex;align-items:center;gap:10px;padding:14px 16px 4px;max-width:640px;margin:0 auto}
.logo{width:34px;height:34px;flex:none}
.brand{font-weight:800;letter-spacing:.06em;font-size:15px}
.brand small{display:block;font-weight:600;color:var(--dim);letter-spacing:.14em;font-size:10px;text-transform:uppercase}
.streak{margin-left:auto;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--amber)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-top:14px}
.panel h2{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:10px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--panel2);border-radius:10px;padding:10px;text-align:center}
.stat b{display:block;font-size:22px;font-weight:800}
.stat span{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.stat .t{color:var(--teal)} .stat .a{color:var(--amber)} .stat .v{color:var(--violet)}
.map353{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.col353{background:var(--panel2);border-radius:10px;padding:10px 8px;border-top:3px solid var(--amber)}
.col353:nth-child(2){border-top-color:var(--teal)}
.col353:nth-child(3){border-top-color:var(--violet)}
.col353 b{display:block;font-size:26px;font-weight:800;text-align:center}
.col353 em{display:block;font-style:normal;font-size:10px;text-align:center;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.col353 ul{list-style:none;font-size:11.5px;color:var(--ink)}
.col353 li{padding:3px 0;border-top:1px dashed var(--line)}
.col353 li small{color:var(--faint);float:right}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;
  border-radius:12px;padding:13px 18px;font-size:15px;font-weight:700;font-family:inherit;color:#111;
  background:var(--amber);width:100%;margin-top:10px;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn.teal{background:var(--teal)}
.btn.small{width:auto;padding:9px 14px;font-size:13px;margin-top:0}
.btn:disabled{opacity:.4;cursor:default}
.btn.locked{background:var(--panel2);color:var(--faint);border:1px solid var(--line)}
.deck-zone{perspective:1000px;margin-top:16px}
.note{
  position:relative;background:linear-gradient(178deg,#FFD766 0%,#FFC53D 70%,#F0B32E 100%);
  color:#2A2100;border-radius:4px;min-height:240px;padding:26px 20px 46px;
  transform:rotate(-1.3deg);
  box-shadow:0 12px 24px rgba(0,0,0,.45), 0 2px 4px rgba(0,0,0,.3);
  font-size:19px;font-weight:700;line-height:1.4;
  display:flex;align-items:center;justify-content:center;text-align:center;
}
.note.back{background:linear-gradient(178deg,#7CEADB 0%,#2DD4BF 70%,#1FBFAC 100%);color:#00312B;transform:rotate(1.1deg)}
.note::before{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(-2deg);
  width:88px;height:22px;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.35);border-radius:2px}
.note .tag{position:absolute;top:10px;left:12px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.55}
.note .hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:11px;font-weight:600;opacity:.5}
.srs-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.srs-btns button{border:none;border-radius:10px;padding:12px 4px;font-weight:800;font-size:13px;font-family:inherit;cursor:pointer;color:#101418}
.srs-btns .again{background:var(--coral)} .srs-btns .hard{background:#FFA94D}
.srs-btns .good{background:var(--teal)} .srs-btns .easy{background:var(--blue)}
.srs-btns small{display:block;font-weight:600;font-size:10px;opacity:.7}
.mwall{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.mnote{border-radius:3px;padding:14px 12px 12px;font-size:12.5px;line-height:1.45;color:#26210A;
  background:#FFE08A;box-shadow:0 4px 10px rgba(0,0,0,.35)}
.mwall .mnote:nth-child(3n){background:#9BEEDF;color:#03352E;transform:rotate(1.4deg)}
.mwall .mnote:nth-child(3n+1){transform:rotate(-1.6deg)}
.mwall .mnote:nth-child(3n+2){background:#D8C6FF;color:#241A45;transform:rotate(.9deg)}
.mnote b{display:block;font-size:13.5px;margin-bottom:4px}
.qtext{font-size:17.5px;font-weight:700;margin:8px 0 14px}
.opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:12px;padding:13px 14px;font-size:15px;font-family:inherit;margin-top:8px;cursor:pointer}
.opt.correct{border-color:var(--teal);background:rgba(45,212,191,.12);color:var(--teal);font-weight:700}
.opt.wrong{border-color:var(--coral);background:rgba(255,107,107,.1);color:var(--coral)}
.opt:disabled{cursor:default;opacity:.9}
.exp{background:var(--panel2);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;
  padding:12px;font-size:13.5px;color:var(--dim);margin-top:12px}
.exp b{color:var(--amber)}
.prog{height:6px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-top:12px}
.prog i{display:block;height:100%;background:var(--teal);border-radius:99px;transition:width .3s}
.meta-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--dim);margin-top:12px}
.timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:16px;color:var(--amber)}
.timer.low{color:var(--coral)}
.navgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:12px}
.navgrid button{aspect-ratio:1;border-radius:8px;border:1px solid var(--line);background:var(--panel2);
  color:var(--dim);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.navgrid button.done{background:rgba(92,168,255,.18);color:var(--blue);border-color:var(--blue)}
.navgrid button.cur{outline:2px solid var(--amber)}
.score-big{font-size:56px;font-weight:800;text-align:center;margin:6px 0}
.pass{color:var(--teal)} .fail{color:var(--coral)}
.verdict{text-align:center;font-size:14px;color:var(--dim);margin-bottom:8px}
.hist{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:12px}
.hist .bar{flex:1;background:var(--panel2);border-radius:6px 6px 0 0;position:relative;min-width:10px}
.hist .bar i{position:absolute;bottom:0;left:0;right:0;background:var(--blue);border-radius:6px 6px 0 0}
.hist .bar.p i{background:var(--teal)}
.hist .bar span{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--dim)}
.listen-now{background:var(--panel2);border-radius:12px;padding:16px;margin-top:12px;min-height:120px;font-size:16px;font-weight:600}
.listen-now .lab{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--amber);font-weight:800;margin-bottom:6px}
.transport{display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:10px;margin-top:12px}
.transport button{border:none;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  font-size:22px;padding:14px;cursor:pointer;font-family:inherit}
.transport .play{background:var(--amber);color:#111;font-weight:800}
.range-row{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:13px;color:var(--dim)}
input[type=range]{flex:1;accent-color:var(--amber)}
select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:14px;width:100%;margin-top:8px}
.cycle{margin-top:8px}
.cycle svg{width:100%;height:auto;display:block}
nav.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(12,16,21,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:50}
nav.bottom button{background:none;border:none;color:var(--faint);font-family:inherit;font-size:10.5px;font-weight:700;
  letter-spacing:.04em;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px}
nav.bottom button .ico{font-size:20px;line-height:1}
nav.bottom button.on{color:var(--amber)}
.screen{display:none}.screen.on{display:block}
.pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:999px;
  padding:4px 11px;font-size:12px;font-weight:700;color:var(--dim);margin:4px 4px 0 0;cursor:pointer}
.pill.on{background:var(--amber);color:#111;border-color:var(--amber)}
.lockmsg{font-size:13px;color:var(--faint);margin-top:6px}
.linkout{color:var(--blue);font-size:13.5px;text-decoration:none;font-weight:600}
.center{text-align:center}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
